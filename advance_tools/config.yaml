name: Advance Tools
version: "1.0.2"
# The slug is part of the add-on's identity in Home Assistant. Changing it
# makes HA treat this as a brand-new add-on and orphan the existing /data
# (users, dashboards, packs), so it must not change after release.
slug: advance_tools
description: Plugin-based smart home toolbox — Dashboard Maker, Automation Maker and more, with a multi-user admin hub
url: https://github.com/FreeHaTools/Advance-tools
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
homeassistant_api: true
# Supervisor API access for Backup Manager (list/create/download backups).
# The "backup" role only grants the /backups endpoints — nothing else.
hassio_api: true
hassio_role: backup
ports:
  8234/tcp: 8234
  8235/tcp: null
ports_description:
  8234/tcp: Advance Tools web server (tablets connect here)
  8235/tcp: Extra HTTP port (only used when ssl + keep_http are on)
map:
  - type: ssl
  # read-only view of the HA config folder — used by Automation Maker to
  # locate YAML-defined automations so they can be converted to UI-editable
  - type: homeassistant_config
    read_only: true
webui: "[PROTO:ssl]://[HOST]:[PORT:8234]/"
watchdog: "[PROTO:ssl]://[HOST]:[PORT:8234]/health"
ingress: true
ingress_port: 8099
panel_icon: mdi:toolbox
panel_title: Advance Tools
panel_admin: true
options:
  ssl: false
  certfile: fullchain.pem
  keyfile: privkey.pem
  keep_http: false
  domain: ""
schema:
  ssl: bool
  certfile: str
  keyfile: str
  keep_http: bool
  domain: str?
